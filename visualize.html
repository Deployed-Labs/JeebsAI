<!DOCTYPE html>
<html lang="en">
<head>
        <style>
            .menu-bar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                background: #7fffd4;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                z-index: 1000;
                padding: 16px 0;
            }
            .menu-bar-inner {
                max-width: 900px;
                margin: 0 auto;
                display: flex;
                gap: 16px;
                justify-content: flex-end;
            }
            .menu-link {
                padding: 12px 24px;
                background: #181c24;
                color: #7fffd4;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: bold;
                text-decoration: none;
                border: 2px solid #7fffd4;
                transition: background 0.2s, color 0.2s, border-color 0.2s;
            }
            .menu-link:hover {
                background: #23283a;
                color: #fff;
                border-color: #fff;
            }
        </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeebs Brain Visualization</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        #mynetwork { width: 100vw; height: 100vh; background: #f4f4f4; }
        #loading { position: absolute; top: 20px; left: 20px; background: white; padding: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
        <div class="menu-bar">
            <div class="menu-bar-inner">
                <a href="/admin_dashboard.html" class="menu-link">Dashboard</a>
                <a href="/admin_whitelist.html" class="menu-link">Whitelist</a>
                <a href="/admin_blacklist.html" class="menu-link">Blacklist</a>
            </div>
        </div>
        <div style="height:64px;"></div> <!-- Spacer for fixed menu -->
    <div id="loading">Loading Brain Graph...</div>
    <div id="mynetwork"></div>

    <script type="text/javascript">
        async function loadGraph() {
            try {
                const res = await fetch('/api/brain/visualize');
                const data = await res.json();
                
                const container = document.getElementById('mynetwork');
                const nodes = new vis.DataSet(data.nodes);
                const edges = new vis.DataSet(data.edges);
                
                const graphData = { nodes: nodes, edges: edges };
                const options = {
                    nodes: {
                        shape: 'dot',
                        size: 16,
                        font: { size: 14, color: '#333' },
                        borderWidth: 2,
                        color: { background: '#97C2FC', border: '#2B7CE9' }
                    },
                    edges: {
                        width: 1,
                        color: { color: '#ccc', highlight: '#848484' },
                        smooth: { type: 'continuous' }
                    },
                    physics: {
                        stabilization: false,
                        barnesHut: {
                            gravitationalConstant: -8000,
                            springConstant: 0.04,
                            springLength: 95
                        }
                    }
                };
                
                new vis.Network(container, graphData, options);
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = 'Error loading graph: ' + e;
            }
        }
        loadGraph();
    </script>
</body>
</html>
