version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: jeebs
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: jeebs
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeebs"]
      interval: 5s
      retries: 5

  app:
    build: .
    image: jeebsai:local
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://jeebs:secret@db:5432/jeebs
      - DB_HOST=db
      - DB_PORT=5432
      - RUST_LOG=info
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db-data:
