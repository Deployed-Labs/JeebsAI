<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with JeebsAI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .chat-container { max-width: 600px; margin: 8vh auto 0 auto; background: rgba(20,34,60,0.97); border-radius: 20px; box-shadow: 0 8px 32px rgba(10,37,64,0.25), 0 1.5px 8px #3a8dde33; padding: 2.5rem 2rem 2.2rem 2rem; display: flex; flex-direction: column; align-items: center; border: 1.5px solid #3a8dde44; }
    .chat-title { font-size: 2rem; font-weight: 800; margin-bottom: 1.2rem; letter-spacing: 1.5px; text-shadow: 0 2px 8px #193a5e44; }
    .chat-box { width: 100%; min-height: 200px; background: #223a5e; border-radius: 12px; color: #fff; padding: 1.2rem; margin-bottom: 1.2rem; overflow-y: auto; }
    .chat-input-row { display: flex; width: 100%; gap: 0.7rem; }
    .chat-input-row input { flex: 1; padding: 0.7rem 1rem; border-radius: 8px; border: none; background: #2d4a70; color: #fff; font-size: 1rem; }
    .chat-input-row button { padding: 0.7rem 1.2rem; border-radius: 8px; border: none; background: #3a8dde; color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .chat-input-row button:hover { background: #256bb2; }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="chat-container">
    <div class="logo-circle" style="margin-bottom:0.7rem;">
      <svg width="40" height="40" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" stroke="#3a8dde" stroke-width="4" fill="#193a5e"/>
        <circle cx="30" cy="30" r="12" fill="#3a8dde" opacity=".7"/>
        <path d="M30 8v16M30 36v16M8 30h16M36 30h16" stroke="#fff" stroke-width="2" opacity=".5"/>
      </svg>
    </div>
    <div class="chat-title">Chat with JeebsAI</div>
    <div class="chat-box" id="chatBox">Welcome! How can I help you today?</div>
    <form class="chat-input-row" onsubmit="sendMessage(event)">
      <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off" required>
      <button type="submit">Send</button>
    </form>
  </div>
  <footer>
    <p>&copy; 2026 JeebsAI &mdash; All rights reserved.</p>
  </footer>
  <script>
    function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const chatBox = document.getElementById('chatBox');
      if (input.value.trim() === '') return;
      chatBox.innerHTML += `<div><b>You:</b> ${input.value}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      setTimeout(() => {
        chatBox.innerHTML += `<div><b>JeebsAI:</b> <span style='opacity:0.7'>This is a static demo. (No backend response)</span></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 600);
      input.value = '';
    }
  </script>
</body>
</html>
