<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holographic Brain Visualization - JeebsAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            min-height: 100vh;
        }

        #container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 25px;
            border-bottom: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .brain-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        a.nav-button {
            text-decoration: none;
            color: white;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.5);
            transition: all 0.3s ease;
        }

        a.nav-button:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #0a0e27 0%, #1a2a5a 50%, #0a0e27 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #sidebar {
            width: 300px;
            background: rgba(10, 14, 39, 0.95);
            border-left: 2px solid rgba(102, 126, 234, 0.3);
            color: #fff;
            overflow-y: auto;
            padding: 20px;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-section h2 {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
            padding-bottom: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            font-size: 14px;
        }

        .stat-label {
            color: #999;
        }

        .stat-value {
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
        }

        .memory-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .memory-item {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .memory-item:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.4);
            transform: translateX(5px);
        }

        .memory-item.selected {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .memory-query {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .memory-response {
            color: #aaa;
            font-size: 11px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .memory-time {
            color: #666;
            font-size: 10px;
            margin-top: 5px;
        }

        #details-panel {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        #details-panel.active {
            display: block;
        }

        .detail-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .detail-text {
            color: #ccc;
            font-size: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .controls {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(102, 126, 234, 0.3);
        }

        .control-label {
            font-size: 12px;
            color: #667eea;
            margin-bottom: 8px;
            display: block;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(102, 126, 234, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.6);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 18px;
            color: #667eea;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .scrollbar-hide::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-hide::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-hide::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.4);
            border-radius: 3px;
        }

        .scrollbar-hide::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.6);
        }

        #sidebar {
            scrollbar-width: thin;
            scrollbar-color: rgba(102, 126, 234, 0.4) transparent;
        }

        .info-box {
            background: rgba(102, 126, 234, 0.15);
            border-left: 3px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #aaa;
            line-height: 1.4;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <div class="header-left">
                <div class="brain-icon">🧠</div>
                <h1>Holographic Brain</h1>
            </div>
            <div class="header-right">
                <button onclick="resetView()">Reset View</button>
                <button onclick="screenshot()">Screenshot</button>
                <a href="/admin" class="nav-button">← Back to Admin</a>
            </div>
        </div>

        <div id="main">
            <div id="canvas-container">
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <span>Loading brain visualization...</span>
                </div>
            </div>

            <div id="sidebar" class="scrollbar-hide">
                <div class="info-box">
                    💡 Hover over nodes to see memories. Click to select. Drag to move. Scroll to zoom.
                </div>

                <div class="sidebar-section">
                    <h2>Statistics</h2>
                    <div class="stat-item">
                        <span class="stat-label">Total Memories</span>
                        <span class="stat-value" id="stat-memories">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Connections</span>
                        <span class="stat-value" id="stat-edges">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Conversations</span>
                        <span class="stat-value" id="stat-conversations">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Brain Dimension</span>
                        <span class="stat-value" id="stat-dimension">512D</span>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h2>Memories</h2>
                    <div class="memory-list" id="memory-list"></div>
                </div>

                <div class="sidebar-section controls">
                    <label class="control-label">Particle Speed: <span id="speed-value">1.0x</span></label>
                    <input type="range" id="speed-control" min="0" max="2" step="0.1" value="1" 
                           onchange="updateSpeed()">
                </div>

                <div id="details-panel">
                    <div class="detail-title">Selected Memory</div>
                    <div class="detail-text">
                        <div style="margin-bottom: 10px;"><strong>Query:</strong></div>
                        <div id="detail-query" style="margin-bottom: 15px;"></div>
                        <div style="margin-bottom: 10px;"><strong>Response:</strong></div>
                        <div id="detail-response" style="margin-bottom: 15px;"></div>
                        <div style="font-size: 10px; color: #666;">
                            Created: <span id="detail-date"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        let scene, camera, renderer, controls;
        let nodes = [], edges = [];
        let nodeObjects = new Map();
        let edgeObjects = [];
        let selectedNode = null;
        let speedMultiplier = 1.0;

        // Get auth token from localStorage
        function getAuthToken() {
            return localStorage.getItem('token');
        }

        // Check authentication status
        async function checkAuth() {
            const token = getAuthToken();
            
            if (!token) {
                showAuthError('Not logged in. Please log in first.', true);
                return false;
            }

            // Verify token with backend
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthError('Your session has expired. Please log in again.', true);
                    return false;
                }

                if (!response.ok) {
                    showAuthError('Authentication verification failed.', true);
                    return false;
                }

                return true;
            } catch (error) {
                console.error('Auth check error:', error);
                showAuthError('Could not verify authentication: ' + error.message, true);
                return false;
            }
        }

        // Show authentication error with help
        function showAuthError(message, showLoginButton = false) {
            const loadingDiv = document.getElementById('loading');
            let html = `<div style="text-align: center; color: #ddd;">
                <div style="font-size: 48px; margin-bottom: 20px;">🔐</div>
                <div style="font-size: 18px; margin-bottom: 10px;">${message}</div>`;
            
            if (showLoginButton) {
                html += `<div style="margin-top: 20px;">
                    <a href="/" style="color: #667eea; text-decoration: none; font-size: 16px; border: 2px solid #667eea; padding: 10px 20px; border-radius: 5px; display: inline-block;">← Go to Login</a>
                </div>`;
            }
            
            html += `<div style="margin-top: 30px; font-size: 12px; color: #666;">
                <p>If you are logged in but see this message, try:</p>
                <ul style="text-align: left; display: inline-block;">
                    <li>Refreshing the page</li>
                    <li>Clearing your browser cache</li>
                    <li>Logging out and logging back in</li>
                </ul>
            </div></div>`;
            
            loadingDiv.innerHTML = html;
        }

        // Fetch brain visualization data
        async function fetchBrainData() {
            try {
                const isAuthenticated = await checkAuth();
                if (!isAuthenticated) return;

                const token = getAuthToken();
                const response = await fetch('/api/admin/brain/viz-data', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthError('Your session has expired. Please log in again.', true);
                    return;
                }

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }

                const data = await response.json();
                nodes = data.nodes || [];
                edges = data.edges || [];

                updateStats(data.stats);
                document.getElementById('loading').style.display = 'none';

                initVisualization();
                createBrainNetwork();
            } catch (error) {
                console.error('Error fetching brain data:', error);
                const loading = document.getElementById('loading');
                loading.innerHTML = `<div style="text-align: center; color: #ff6b6b;">
                    <div style="font-size: 48px; margin-bottom: 20px;">❌</div>
                    <div style="font-size: 16px;">Error loading visualization</div>
                    <div style="font-size: 12px; color: #aaa; margin-top: 10px;">${error.message}</div>
                    <div style="margin-top: 20px;">
                        <button onclick="location.reload()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">Retry</button>
                        <a href="/" style="margin-left: 10px; color: #667eea; text-decoration: none;">Back to Login</a>
                    </div>
                </div>`;
            }
        }

        // Update statistics in sidebar
        function updateStats(stats) {
            document.getElementById('stat-memories').textContent = stats.total_memories;
            document.getElementById('stat-edges').textContent = stats.total_edges;
            document.getElementById('stat-conversations').textContent = stats.unique_conversations;
            document.getElementById('stat-dimension').textContent = stats.brain_dimension + 'D';
        }

        // Initialize Three.js scene
        function initVisualization() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e1f);
            scene.fog = new THREE.Fog(0x0a0e1f, 100, 1000);

            // Camera setup
            camera = new THREE.PerspectiveCamera(
                75,
                container.clientWidth / container.clientHeight,
                0.1,
                10000
            );
            camera.position.z = 50;

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x667eea, 1, 100);
            pointLight.position.set(50, 50, 50);
            pointLight.castShadow = true;
            scene.add(pointLight);

            // Simple orbit-like controls with mouse
            setupControls();

            // Handle window resize
            window.addEventListener('resize', onWindowResize);

            // Animation loop
            animate();
        }

        // Setup mouse controls
        function setupControls() {
            const container = document.getElementById('canvas-container');
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            let isDragging = false;
            let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            let dragPoint = new THREE.Vector3();
            let dragOffset = new THREE.Vector3();
            let draggedObject = null;

            container.addEventListener('mousemove', (event) => {
                mouse.x = (event.clientX / container.clientWidth) * 2 - 1;
                mouse.y = -(event.clientY / container.clientHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);

                if (isDragging && draggedObject) {
                    raycaster.ray.intersectPlane(dragPlane, dragPoint);
                    draggedObject.position.copy(dragPoint).sub(dragOffset);
                } else {
                    // Highlight on hover
                    const intersects = raycaster.intersectObjects(Array.from(nodeObjects.values()));
                    nodeObjects.forEach(obj => {
                        if (obj.material.emissive) {
                            obj.material.emissive.setHex(0x000000);
                        }
                    });

                    if (intersects.length > 0) {
                        const sphere = intersects[0].object;
                        if (sphere.material.emissive) {
                            sphere.material.emissive.setHex(0x667eea);
                        }
                    }
                }
            });

            container.addEventListener('mousedown', (event) => {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(Array.from(nodeObjects.values()));

                if (intersects.length > 0) {
                    isDragging = true;
                    draggedObject = intersects[0].object;
                    dragPlane.setFromNormalAndCoplanarPoint(
                        camera.getWorldDirection(new THREE.Vector3()).negate(),
                        draggedObject.position
                    );
                    raycaster.ray.intersectPlane(dragPlane, dragPoint);
                    dragOffset.copy(dragPoint).sub(draggedObject.position);

                    // Select node
                    selectNode(draggedObject.userData.data);
                }
            });

            container.addEventListener('mouseup', () => {
                isDragging = false;
                draggedObject = null;
            });

            // Zoom with scroll wheel
            container.addEventListener('wheel', (event) => {
                event.preventDefault();
                const zoomSpeed = 2;
                const direction = event.deltaY > 0 ? 1 : -1;
                camera.position.z = Math.max(10, Math.min(500, camera.position.z + direction * zoomSpeed));
            }, false);
        }

        // Create brain network visualization
        function createBrainNetwork() {
            // Create nodes (memories)
            nodes.forEach(node => {
                // Assign position based on conversation and angle
                const angle = Math.random() * Math.PI * 2;
                const radius = 20 + Math.random() * 15;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const z = (Math.random() - 0.5) * 10;

                const geometry = new THREE.SphereGeometry(0.8, 32, 32);
                const material = new THREE.MeshStandardMaterial({
                    color: colorFromConversation(node.conversation_id),
                    metalness: 0.3,
                    roughness: 0.4,
                    emissive: 0x000000,
                    emissiveIntensity: 0.5
                });

                const sphere = new THREE.Mesh(geometry, material);
                sphere.castShadow = true;
                sphere.receiveShadow = true;
                sphere.position.set(x, y, z);
                sphere.userData = {
                    data: node,
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.02,
                        (Math.random() - 0.5) * 0.02,
                        (Math.random() - 0.5) * 0.01
                    )
                };

                scene.add(sphere);
                nodeObjects.set(node.id, sphere);
            });

            // Create edges (connections)
            edges.forEach(edge => {
                const sourceNode = nodes.find(n => n.id === edge.source);
                const targetNode = nodes.find(n => n.id === edge.target);

                if (sourceNode && targetNode) {
                    const sourceObj = nodeObjects.get(edge.source);
                    const targetObj = nodeObjects.get(edge.target);

                    if (sourceObj && targetObj) {
                        const points = [sourceObj.position.clone(), targetObj.position.clone()];
                        const geometry = new THREE.BufferGeometry().setFromPoints(points);
                        const material = new THREE.LineBasicMaterial({
                            color: 0x667eea,
                            linewidth: 2,
                            opacity: 0.3 * edge.weight,
                            transparent: true
                        });

                        const line = new THREE.Line(geometry, material);
                        scene.add(line);
                        edgeObjects.push({
                            line,
                            sourceObj,
                            targetObj
                        });
                    }
                }
            });

            // Populate memory list
            const memoryList = document.getElementById('memory-list');
            memoryList.innerHTML = nodes.map(node => `
                <div class="memory-item" onclick="selectNodeFromList(${node.id})">
                    <div class="memory-query">${escapeHtml(node.label)}</div>
                    <div class="memory-response">${escapeHtml(node.response)}</div>
                    <div class="memory-time">${new Date(node.created_at).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        // Select a node and show details
        function selectNode(nodeData) {
            selectedNode = nodeData;

            // Update sidebar
            document.getElementById('detail-query').textContent = nodeData.query;
            document.getElementById('detail-response').textContent = nodeData.response;
            document.getElementById('detail-date').textContent = new Date(nodeData.created_at).toLocaleString();
            document.getElementById('details-panel').classList.add('active');

            // Highlight in list
            document.querySelectorAll('.memory-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.closest('.memory-item')?.classList.add('selected');
        }

        function selectNodeFromList(nodeId) {
            const nodeData = nodes.find(n => n.id === nodeId);
            if (nodeData) {
                selectNode(nodeData);
                // Highlight sphere
                const sphere = nodeObjects.get(nodeId);
                if (sphere) {
                    sphere.material.emissive.setHex(0xff6b6b);
                }
            }
        }

        // Helper functions
        function colorFromConversation(convId) {
            const colors = [0x667eea, 0x764ba2, 0xff6b6b, 0x4ecdc4, 0xffe66d, 0x95e1d3];
            return colors[convId % colors.length];
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function updateSpeed() {
            const control = document.getElementById('speed-control');
            speedMultiplier = parseFloat(control.value);
            document.getElementById('speed-value').textContent = speedMultiplier.toFixed(1) + 'x';
        }

        function resetView() {
            camera.position.z = 50;
        }

        function screenshot() {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.href = renderer.domElement.toDataURL('image/png');
            link.download = `brain-viz-${Date.now()}.png`;
            link.click();
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Update node positions (floating motion)
            nodeObjects.forEach(sphere => {
                const velocity = sphere.userData.velocity;
                sphere.position.add(velocity.clone().multiplyScalar(speedMultiplier));

                // Gentle rotation
                sphere.rotation.x += 0.001;
                sphere.rotation.y += 0.002;

                // Keep nodes in bounds
                const bound = 50;
                ['x', 'y', 'z'].forEach(axis => {
                    if (Math.abs(sphere.position[axis]) > bound) {
                        velocity[axis] *= -1;
                        sphere.position[axis] = Math.sign(sphere.position[axis]) * (bound - 2);
                    }
                });
            });

            // Update edge positions
            edgeObjects.forEach(edgeObj => {
                const points = [edgeObj.sourceObj.position.clone(), edgeObj.targetObj.position.clone()];
                edgeObj.line.geometry.setFromPoints(points);
            });

            renderer.render(scene, camera);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', fetchBrainData);
    </script>
</body>
</html>
