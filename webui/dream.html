<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeebsAI Holographic Dream</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            position: relative;
            width: 80%;
            max-width: 800px;
            text-align: center;
            perspective: 1000px;
        }
        .hologram {
            padding: 40px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            background: rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.2);
            transform: rotateX(10deg);
            animation: float 6s ease-in-out infinite;
            position: relative;
        }
        .hologram.reacting {
            animation: pulse 0.5s ease-in-out 3;
            border-color: #f0f;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.5), inset 0 0 50px rgba(255, 0, 255, 0.5);
        }
        .hologram::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #0ff;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        #dream-text {
            font-size: 1.2em;
            line-height: 1.6;
            text-shadow: 0 0 5px #0ff;
            opacity: 0.9;
        }
        @keyframes float {
            0%, 100% { transform: rotateX(10deg) translateY(0); }
            50% { transform: rotateX(10deg) translateY(-10px); }
        }
        @keyframes pulse {
            0% { transform: rotateX(10deg) scale(1); }
            50% { transform: rotateX(10deg) scale(1.05); }
            100% { transform: rotateX(10deg) scale(1); }
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0, 255, 255, 0.2) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 10s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="hologram">
            <h1>Active Dream State</h1>
            <div id="dream-text">Loading holographic projection...</div>
        </div>
    </div>

    <script>
        let lastReactionTime = "";

        async function fetchDream() {
            try {
                const response = await fetch('/api/brain/dream');
                const data = await response.json();
                if (data.success) {
                    const text = data.dream;
                    const container = document.getElementById('dream-text');
                    if (container.innerText !== text) {
                        container.innerText = text;
                    }

                    if (data.reaction && data.reaction.timestamp) {
                        if (lastReactionTime && data.reaction.timestamp !== lastReactionTime) {
                            const hologram = document.querySelector('.hologram');
                            hologram.classList.remove('reacting');
                            void hologram.offsetWidth; // trigger reflow
                            hologram.classList.add('reacting');
                        }
                        lastReactionTime = data.reaction.timestamp;
                    }
                }
            } catch (e) {
                console.error("Failed to fetch dream:", e);
            }
        }

        fetchDream();
        setInterval(fetchDream, 2000); // Refresh every 2 seconds
    </script>
</body>
</html>
