<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeebsAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/webui/style.css">
</head>
<body>
    <div id="root">
        <!-- LOGIN PAGE -->
        <div id="loginPage" class="page active">
            <div class="container">
                <div class="card">
                    <h1>JeebsAI</h1>
                    <p class="subtitle">Sign In</p>

                    <form id="loginForm">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="username" required>
                        </div>

                        <div class="form-group">
                            <label>Challenge (Click Generate)</label>
                            <button type="button" id="genBtn" class="btn-secondary">Generate Challenge</button>
                            <textarea id="challenge" readonly></textarea>
                        </div>

                        <div class="form-group">
                            <label>Signed Message</label>
                            <textarea id="signed" placeholder="Paste your PGP signed message here" required></textarea>
                        </div>

                        <button type="submit" class="btn-primary">Sign In</button>
                    </form>

                    <p class="footer-text">
                        Don't have an account? <a href="#" onclick="switchPage('registerPage')">Create one</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- REGISTER PAGE -->
        <div id="registerPage" class="page">
            <div class="container">
                <div class="card">
                    <h1>JeebsAI</h1>
                    <p class="subtitle">Create Account</p>

                    <form id="registerForm">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="regUsername" placeholder="3-32 characters" required>
                        </div>

                        <div class="form-group">
                            <label>Email (Optional)</label>
                            <input type="email" id="regEmail">
                        </div>

                        <div class="form-group">
                            <label>PGP Public Key</label>
                            <textarea id="regKey" placeholder="-----BEGIN PGP PUBLIC KEY BLOCK-----" required></textarea>
                        </div>

                        <button type="submit" class="btn-primary">Create Account</button>
                    </form>

                    <p class="footer-text">
                        Already have an account? <a href="#" onclick="switchPage('loginPage')">Sign in</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <div class="header-top">
                        <h2>JeebsAI</h2>
                        <div class="header-buttons">
                            <button id="themeBtn" class="icon-btn" title="Toggle Theme">🌙</button>
                            <button id="copyBtn" class="icon-btn" title="Copy Token">📋</button>
                            <button id="logoutBtn" class="icon-btn" title="Logout">🚪</button>
                        </div>
                    </div>
                </div>

                <div class="chat-messages" id="messages"></div>

                <div class="chat-footer">
                    <form id="chatForm">
                        <textarea id="prompt" placeholder="Ask me anything..." rows="2"></textarea>
                        <button type="submit" class="btn-primary">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/webui/auth.js"></script>
    <script>
        const state = {
            loggedIn: false,
            username: "",
            token: "",
            isDark: localStorage.getItem('theme') === 'dark'
        };

        // Theme
        if (state.isDark) {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').textContent = '☀️';
        }

        document.getElementById('themeBtn')?.addEventListener('click', () => {
            state.isDark = !state.isDark;
            document.body.setAttribute('data-theme', state.isDark ? 'dark' : 'light');
            localStorage.setItem('theme', state.isDark ? 'dark' : 'light');
            document.getElementById('themeBtn').textContent = state.isDark ? '☀️' : '🌙';
        });

        // Page switching
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
        }

        // Generate challenge
        document.getElementById('genBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value || 'user';
            const ts = Math.floor(Date.now() / 1000);
            document.getElementById('challenge').value = `LOGIN:${user}:${ts}`;
        });

        // Login
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const signed = document.getElementById('signed').value;

            try {
                const res = await fetch('/api/login_pgp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, signed_message: signed })
                });

                if (!res.ok) throw new Error('Login failed');
                const data = await res.json();

                state.loggedIn = true;
                state.username = username;
                state.token = data.token || '';
                if (state.token) jeebsSetToken(state.token);

                switchPage('chatPage');
                loadChat();
            } catch (err) {
                alert('Login failed: ' + err.message);
            }
        });

        // Register
        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const pgp_public_key = document.getElementById('regKey').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, pgp_public_key })
                });

                if (!res.ok) throw new Error('Registration failed');

                document.getElementById('username').value = username;
                switchPage('loginPage');
                alert('Account created! Now sign in.');
            } catch (err) {
                alert('Registration failed: ' + err.message);
            }
        });

        // Chat
        async function loadChat() {
            try {
                const res = await fetch('/api/chat/history?limit=50', {
                    headers: state.token ? { 'Authorization': `Bearer ${state.token}` } : {}
                });
                const history = await res.json();
                const msgs = document.getElementById('messages');
                msgs.innerHTML = '';
                history.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.role}`;
                    div.textContent = msg.message;
                    msgs.appendChild(div);
                });
            } catch (e) {
                console.log('Chat history error:', e);
            }
        }

        document.getElementById('chatForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('prompt').value;
            if (!prompt) return;

            const msgs = document.getElementById('messages');
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = prompt;
            msgs.appendChild(userMsg);
            document.getElementById('prompt').value = '';

            try {
                const res = await fetch('/api/jeebs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(state.token ? { 'Authorization': `Bearer ${state.token}` } : {})
                    },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();

                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.textContent = data.response || 'No response';
                msgs.appendChild(botMsg);
                msgs.scrollTop = msgs.scrollHeight;
            } catch (err) {
                const errMsg = document.createElement('div');
                errMsg.className = 'message bot error';
                errMsg.textContent = 'Error: ' + err.message;
                msgs.appendChild(errMsg);
            }
        });

        document.getElementById('copyBtn')?.addEventListener('click', () => {
            if (state.token) {
                navigator.clipboard.writeText(state.token);
                alert('Token copied!');
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (e) { }
            state.loggedIn = false;
            state.username = '';
            state.token = '';
            jeebsClearToken();
            switchPage('loginPage');
            document.getElementById('loginForm').reset();
        });

        // Check if already logged in
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                if (data.logged_in) {
                    state.loggedIn = true;
                    state.username = data.username;
                    state.token = data.token || '';
                    switchPage('chatPage');
                    loadChat();
                }
            } catch (e) {
                console.log('Auth check failed');
            }
        }

        checkAuth();
    </script>
</body>
</html>
