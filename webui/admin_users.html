<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>User Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/webui/style.css"/>
    <style>
        .user-table { width: 100%; border-collapse: collapse; }
        .user-table th, .user-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        .user-table th { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .user-table tr:last-child td { border-bottom: none; }
        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; border: 1px solid transparent; }
        .role-Admin { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .role-Mod { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); }
        .role-Trainer { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-color: rgba(59, 130, 246, 0.3); }
        .role-Reguser { background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .action-btn-sm { padding: 4px 8px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav id="topnav"></nav>
    <div class="shell">
        <div class="header-row" style="margin: 24px 0; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>User Management</h1>
                <p class="text-secondary">View registered users and roles.</p>
            </div>
            <button id="refreshBtn" class="btn btn-secondary btn-sm">Refresh</button>
        </div>
        
        <div class="card">
            <div id="loading" class="text-center p-2 text-muted">Loading users...</div>
            <div id="error" class="text-bad hidden p-2"></div>
            
            <div class="table-responsive">
                <table class="user-table hidden" id="userTable">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Is Admin</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Role Change Modal -->
    <div id="roleModal" class="modal-overlay">
        <div class="modal">
            <h3>Change User Role</h3>
            <p class="text-secondary mb-2">Select a new role for <strong id="roleModalUser" class="text-accent"></strong>.</p>
            
            <form id="roleForm" onsubmit="submitRoleChange(event)">
                <input type="hidden" id="roleUsername">
                <div class="form-group">
                    <label for="newRole">Role</label>
                    <select id="newRole" required>
                        <option value="Reguser">Reguser (Chat only)</option>
                        <option value="Trainer">Trainer (Chat + Training)</option>
                        <option value="Mod">Mod (Chat + Training + Status)</option>
                    </select>
                </div>
                <div class="form-actions" style="justify-content: flex-end;">
                    <button type="button" class="btn btn-ghost" onclick="closeRoleModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/webui/auth.js"></script>
    <script src="/webui/nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth('admin');
            JeebsNav.init('users');
            loadUsers();

            document.getElementById('refreshBtn').addEventListener('click', loadUsers);
        });

        async function loadUsers() {
            const list = document.getElementById('userList');
            const loading = document.getElementById('loading');
            const table = document.getElementById('userTable');
            const error = document.getElementById('error');

            loading.classList.remove('hidden');
            table.classList.add('hidden');
            error.classList.add('hidden');
            list.innerHTML = '';

            try {
                const res = await safeFetch('/api/admin/users', { headers: authHeaders() });
                if (!res.ok) throw new Error('Failed to fetch users');
                const users = await res.json();

                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="fw-bold">${escapeHtml(u.username)}</td>
                        <td class="text-muted">${escapeHtml(u.email || '-')}</td>
                        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
                        <td>${u.is_admin ? '<span class="text-good">Yes</span>' : '<span class="text-muted">No</span>'}</td>
                        <td class="text-right">
                            ${u.username !== '1090mb' ? `
                            <button class="btn btn-secondary btn-sm action-btn-sm" onclick="openRoleModal('${u.username}', '${u.role}')">Role</button>
                            <button class="btn btn-danger btn-sm action-btn-sm" onclick="deleteUser('${u.username}')">Delete</button>
                            ` : '<span class="text-muted text-sm">Root</span>'}
                        </td>
                    `;
                    list.appendChild(tr);
                });

                loading.classList.add('hidden');
                table.classList.remove('hidden');
            } catch (e) {
                loading.classList.add('hidden');
                error.textContent = e.message;
                error.classList.remove('hidden');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Are you sure you want to delete user "${username}"? This cannot be undone.`)) return;
            try {
                const res = await safeFetch(`/api/admin/user/${username}`, { 
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Failed to delete');
                }
                loadUsers();
            } catch (e) {
                alert(e.message);
            }
        }

        function openRoleModal(username, currentRole) {
            document.getElementById('roleModalUser').textContent = username;
            document.getElementById('roleUsername').value = username;
            
            // Set current value, defaulting to Reguser if unknown
            const select = document.getElementById('newRole');
            if (['Reguser', 'Trainer', 'Mod'].includes(currentRole)) {
                select.value = currentRole;
            } else {
                select.value = 'Reguser';
            }
            
            document.getElementById('roleModal').classList.add('open');
        }

        function closeRoleModal() {
            document.getElementById('roleModal').classList.remove('open');
        }

        async function submitRoleChange(e) {
            e.preventDefault();
            const username = document.getElementById('roleUsername').value;
            const role = document.getElementById('newRole').value;
            
            try {
                const res = await safeFetch('/api/admin/user/role', {
                    method: 'POST',
                    headers: authHeaders(true),
                    body: JSON.stringify({ username, role })
                });
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Failed to update role');
                }
                closeRoleModal();
                loadUsers();
            } catch (err) {
                alert(err.message);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
