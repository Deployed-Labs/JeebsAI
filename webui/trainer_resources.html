<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Trainer Resources</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/webui/style.css"/>
</head>
<body>
    <div id="app-layout">
  <aside id="sidebar-container"></aside>
  <main class="main-content">
    <div class="shell">
        <div class="header-row" style="margin: 24px 0;">
            <h1>Trainer Resources</h1>
            <p class="text-secondary">Advanced tools and documentation for AI training.</p>
        </div>
        
        <div class="card">
            <h3>Restricted Access</h3>
            <p>This content is visible only to Trainers, Mods, and Admins.</p>
        </div>
    </div>

    <script src="/webui/auth.js"></script>
    <script src="/webui/nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Ensure user is logged in and has Trainer privileges (includes Admin/Mod)
            await requireAuth('trainer');
            
            JeebsNav.init('resources');
        });
    </script>
  </main>
  </div>
</body>
</html>
