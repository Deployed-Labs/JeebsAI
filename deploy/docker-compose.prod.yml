version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: jeebsai/web:latest
    restart: unless-stopped
    environment:
      - PORT=8000
    expose:
      - "8000"
    networks:
      - webnet

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - webnet

volumes:
  caddy_data:
  caddy_config:

networks:
  webnet:
