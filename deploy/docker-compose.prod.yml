services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: jeebsai/web:latest
    restart: unless-stopped
    environment:
      - PORT=8000
      - FLASK_ENV=production
      - SECRET_KEY=XoweBbSiMcRrse8pz1/QZI86rASDTsnh8ucziuydwAM=
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - jeebs_data:/data
    networks:
      - webnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - webnet

volumes:
  jeebs_data:
  caddy_data:
  caddy_config:

networks:
  webnet:
