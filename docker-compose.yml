version: '3.8'
services:
  app:
    build: .
    image: jeebsai:local
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=sqlite:/data/jeebs.db
    volumes:
      - jeebs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  jeebs_data:
