<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - JeebsAI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .container.beautiful { max-width: 400px; }
    .register-form { display: flex; flex-direction: column; gap: 1.1rem; width: 100%; }
    .register-form input { padding: 0.85rem 1.1rem; border: none; border-radius: 9px; font-size: 1.07rem; background: #223a5e; color: #fff; outline: none; transition: background 0.2s, box-shadow 0.2s; box-shadow: 0 1px 4px #193a5e22; }
    .register-form input:focus { background: #2d4a70; box-shadow: 0 2px 8px #3a8dde33; }
    .register-btn { margin-top: 0.2rem; }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="container beautiful">
    <div class="logo-circle">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" stroke="#3a8dde" stroke-width="4" fill="#193a5e"/>
        <circle cx="30" cy="30" r="12" fill="#3a8dde" opacity=".7"/>
        <path d="M30 8v16M30 36v16M8 30h16M36 30h16" stroke="#fff" stroke-width="2" opacity=".5"/>
      </svg>
    </div>
    <h1 class="title">Register</h1>
    <form class="register-form" action="chat.html" method="get">
      <input type="text" name="username" placeholder="Username" required autocomplete="username">
      <input type="email" name="email" placeholder="Email" required autocomplete="email">
      <input type="password" name="password" placeholder="Password" required autocomplete="new-password">
      <button type="submit" class="login-btn register-btn">Create Account</button>
    </form>
    <div class="divider"><span>or</span></div>
    <a href="index.html" class="alt-login-btn">Back to Login</a>
  </div>
  <footer>
    <p>&copy; 2026 JeebsAI &mdash; All rights reserved.</p>
  </footer>
</body>
</html>
