name: Release Deploy to VPS

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Build and deploy (v0.0.1 semantics)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Rust stable
        run: |
          rustup default stable || true

      - name: Build release
        run: |
          cargo build --release

      - name: Bump semantic VERSION (patch) and commit to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Ensure we're on main and have latest
          git fetch origin main
          git checkout main
          git pull origin main

          # Read current version or default
          if [ -f VERSION ]; then
            cur=$(cat VERSION)
          else
            cur="v0.0.0"
          fi

          if [[ "$cur" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            patch=$((patch+1))
            new_version="v${major}.${minor}.${patch}"
          else
            new_version="v0.0.1"
          fi

          echo "$new_version" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION || true
          git commit -m "chore: bump version to $new_version [ci skip]" || true
          git push origin main || true
          echo "Bumped VERSION -> $new_version"

      - name: Copy files to VPS (v0.0.1 behavior)
        run: |
          scp -o StrictHostKeyChecking=no target/release/jeebs root@192.227.193.148:/root/JeebsAI/target/release/jeebs
          scp -o StrictHostKeyChecking=no -r webui/ root@192.227.193.148:/root/JeebsAI/webui/
          scp -o StrictHostKeyChecking=no VERSION root@192.227.193.148:/root/JeebsAI/VERSION
          ssh -o StrictHostKeyChecking=no root@192.227.193.148 'chmod +x /root/JeebsAI/target/release/jeebs && systemctl daemon-reload && systemctl restart jeebs && systemctl status --no-pager --full jeebs'

