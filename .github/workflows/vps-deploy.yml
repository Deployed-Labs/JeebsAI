name: Release Deploy to VPS

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libsqlite3-dev rsync openssh-client

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deploy-

      - name: Build release binary
        run: cargo build --release

      - name: Create VERSION file from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="${GITHUB_REF##*/}"
          fi
          echo "$TAG" > VERSION
          echo "Created VERSION: $(cat VERSION)"
          ls -lh target/release/jeebs VERSION || true

      - name: Add SSH key to agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts (optional port)
        run: |
          mkdir -p ~/.ssh
          PORT=${{ secrets.VPS_PORT }}
          if [ -z "$PORT" ] || [ "$PORT" = "" ]; then PORT=22; fi
          ssh-keyscan -p "$PORT" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts || true
          chmod 600 ~/.ssh/known_hosts

      - name: Upload binary, webui and VERSION to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_TARGET: ${{ secrets.VPS_TARGET }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_PORT:-}" ]; then VPS_PORT=22; fi
          if [ -z "${VPS_TARGET:-}" ]; then VPS_TARGET=/root/JeebsAI; fi
          echo "Uploading to $VPS_USER@$VPS_HOST:$VPS_TARGET"
          rsync -avz --delete --exclude target/ ./webui/ -e "ssh -p $VPS_PORT" "$VPS_USER@$VPS_HOST:$VPS_TARGET/webui/"
          scp -P "$VPS_PORT" target/release/jeebs "$VPS_USER@$VPS_HOST:$VPS_TARGET/target/release/jeebs"
          scp -P "$VPS_PORT" VERSION "$VPS_USER@$VPS_HOST:$VPS_TARGET/VERSION"

      - name: Remote deploy (restart service)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 15m
          script: |
            set -e
            TARGET=${{ secrets.VPS_TARGET }}
            if [ -z "$TARGET" ]; then TARGET=/root/JeebsAI; fi
            mkdir -p "$TARGET"
            chmod +x "$TARGET/target/release/jeebs" || true
            systemctl daemon-reload || true
            systemctl restart jeebs || true
            sleep 3
            systemctl status --no-pager --full jeebs || true

