name: Deploy to VPS

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libsqlite3-dev clang llvm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deploy-

      - name: Build release binary
        run: cargo build --release

      - name: Create VERSION file from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Prefer the release tag from the event. Fallback to GITHUB_REF suffix if missing (e.g., when manually dispatched).
          if [ -n "$RELEASE_TAG" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="${GITHUB_REF##*/}"
          fi
          echo "$TAG" > VERSION
          echo "Created VERSION: $(cat VERSION)"
          ls -lh target/release/jeebs VERSION || true

