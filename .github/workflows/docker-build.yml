name: Build and Smoke-test Docker image

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build image
        run: |
          docker build -t jeebsai:ci .

      - name: Run container in background
        run: |
          docker run -d --rm -p 8081:8080 --name jeebsai_ci jeebsai:ci || true

      - name: Wait for service
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8081/api/health >/dev/null 2>&1; then
              echo "Service is up" && exit 0
            fi
            sleep 2
          done
          echo "Service did not become healthy" && docker logs jeebsai_ci || true
          exit 1

      - name: Stop container
        if: always()
        run: |
          docker stop jeebsai_ci || true
